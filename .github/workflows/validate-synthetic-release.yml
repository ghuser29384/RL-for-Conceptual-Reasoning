name: Validate synthetic release

on:
  pull_request:
    paths:
      - "arguments/**"
      - "scripts/build-static.mjs"
      - "scripts/unpack-synthetic-1000.mjs"
      - "src/releases/metaphilosophy-1000/**"
      - ".github/workflows/validate-synthetic-release.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: synthetic-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static release
        id: build
        continue-on-error: true
        run: npm run build 2>&1 | tee build.log

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-release-build-log
          path: build.log
          if-no-files-found: error

      - name: Verify generated manifest
        if: steps.build.outcome == 'success'
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from "node:fs/promises";
          const manifest = JSON.parse(await readFile("dist/arguments/data/manifest.json", "utf8"));
          const expected = { records: 1000, positions: 250, critiques: 1000, domains: 25, critiques_per_position: 4 };
          for (const [key, value] of Object.entries(expected)) {
            if (manifest[key] !== value) throw new Error(`${key}: expected ${value}, found ${manifest[key]}`);
          }
          console.log(JSON.stringify(manifest, null, 2));
          NODE

      - name: Upload release manifest
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-release-manifest
          path: dist/arguments/data/manifest.json
          if-no-files-found: error

      - name: Enforce build success
        if: steps.build.outcome != 'success'
        run: exit 1
