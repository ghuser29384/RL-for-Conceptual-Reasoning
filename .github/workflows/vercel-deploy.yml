name: Vercel Deploy

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: vercel-deploy-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests and static build
        run: npm run check

  deploy-preview:
    name: Deploy Preview
    needs: quality-gates
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: Preview
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Verify Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          test -n "$VERCEL_TOKEN" || { echo "::error::Missing VERCEL_TOKEN secret; cannot create Vercel Preview deployments."; exit 1; }
          test -n "$VERCEL_ORG_ID" || { echo "::error::Missing VERCEL_ORG_ID secret; cannot link the Vercel project in CI."; exit 1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "::error::Missing VERCEL_PROJECT_ID secret; cannot link the Vercel project in CI."; exit 1; }

      - name: Pull Vercel Preview environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Preview deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy Preview
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_output="$(vercel deploy --prebuilt --yes --token="$VERCEL_TOKEN")"
          printf '%s\n' "$deployment_output"
          deployment_url="$(printf '%s\n' "$deployment_output" | tail -n 1)"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"

  deploy-production:
    name: Deploy Production
    needs: quality-gates
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Verify Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          test -n "$VERCEL_TOKEN" || { echo "::error::Missing VERCEL_TOKEN secret; cannot create Vercel Production deployments."; exit 1; }
          test -n "$VERCEL_ORG_ID" || { echo "::error::Missing VERCEL_ORG_ID secret; cannot link the Vercel project in CI."; exit 1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "::error::Missing VERCEL_PROJECT_ID secret; cannot link the Vercel project in CI."; exit 1; }

      - name: Pull Vercel Production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Production deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy Production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_output="$(vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN")"
          printf '%s\n' "$deployment_output"
          deployment_url="$(printf '%s\n' "$deployment_output" | tail -n 1)"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
